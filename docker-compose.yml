
services:

  db:
    image: postgis/postgis:15-3.3
    container_name: ghabetna_db
    environment:
      POSTGRES_USER: ghabetna_user
      POSTGRES_PASSWORD: ghabetna_pass
      POSTGRES_DB: forest_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghabetna_user -d forest_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-forest-service:
    build: ./services/user_management
    container_name: ghabetna_user_forest
    env_file:
      - ./services/user_management/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
